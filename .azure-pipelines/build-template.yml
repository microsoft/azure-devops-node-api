# Shared template for build and test steps
parameters:
- name: nodeVersions
  type: object
  default:
    'Node 16':
      versionSpec: '16.x'
      npmVersion: '8'
    'Node 18':
      versionSpec: '18.x'
      npmVersion: '10'
    'Node 20':
      versionSpec: '20.x'
      npmVersion: '10'
    'Node 22':
      versionSpec: '22.x'
      npmVersion: '10'
    'Node 24':
      versionSpec: '24.x'
      npmVersion: '10'

jobs:
- job: BuildAndTest
  displayName: Build and Test
  strategy:
    matrix: ${{ parameters.nodeVersions }}
  steps:
  - task: UseNode@1
    inputs:
      version: $(versionSpec)
    displayName: Install node
  - task: NpmAuthenticate@0
    inputs:
      workingFile: .npmrc
  - script: |
      CURRENT_MAJOR=$(npm --version | cut -d. -f1)
      if [ "$CURRENT_MAJOR" -lt "$(npmVersion)" ]; then
        echo "Required npm $(npmVersion) not present (current: $CURRENT_MAJOR). Installing..."
        npm install -g npm@$(npmVersion) --userconfig=$(Build.SourcesDirectory)/.npmrc
      else
        echo "Required npm $(npmVersion) is already present (current: $CURRENT_MAJOR). Skipping."
      fi
    displayName: Upgrade npm (if needed)
  - script: npm install
    displayName: npm install
  - script: npm run build
    displayName: npm run build
  - script: npm run units
    displayName: Run unit tests
